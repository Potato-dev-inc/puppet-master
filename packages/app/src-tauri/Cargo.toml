[package]
name = "puppet_master_app"
version = "0.1.2"
description = "Puppet Master desktop app"
authors = ["you"]
edition = "2021"
rust-version = "1.77"
default-run = "puppet_master_app"

[lib]
name = "puppet_master_app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "puppet-master-mcp"
path = "src/bin/puppet-master-mcp.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-store = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
portable-pty = "0.8"
vt100 = "0.16"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros", "fs", "process"] }
parking_lot = "0.12"
uuid = { version = "1", features = ["v4", "serde"] }
regex = "1"
once_cell = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
thiserror = "1"
ed25519-dalek = { version = "2", features = ["rand_core"] }
rand = "0.8"
sha2 = "0.10"
base64 = "0.22"
anyhow = "1"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
